<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Poker Equity Calculator</title>
<meta name="description" content="Texas Hold'em poker equity calculator — win probabilities, outs, pot odds and hand ranges for 2–9 players. Free, no install required.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ DESIGN TOKENS ══════════════════════════════ */
:root{
  --bg:#090909;
  --s1:rgba(255,255,255,.042);
  --s2:rgba(255,255,255,.07);
  --s3:rgba(255,255,255,.1);
  --bd:rgba(255,255,255,.08);
  --tx:#f2f2f2;
  --tx2:#a1a1a6;
  --mu:#8e8e93;
  --win:#32d74b;  --winb:rgba(50,215,75,.1);  --winc:rgba(50,215,75,.25);
  --lose:#ff453a; --loseb:rgba(255,69,58,.1);  --losec:rgba(255,69,58,.25);
  --tie:#ff9f0a;  --tieb:rgba(255,159,10,.1);  --tiec:rgba(255,159,10,.25);
  --acc:#d0001b;  --accb:rgba(208,0,27,.14);
  --felt:#163a10; --felt2:#091807; --rim:#1e0c02;
  --ov:rgba(0,0,0,.72);
  --r:14px; --rs:8px; --rss:5px;
  --mono:'SF Mono','Fira Code',ui-monospace,monospace;
  --body:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  --tr:120ms ease;
  --shadow:0 16px 48px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.4);
}
[data-theme=light]{
  --bg:#f2f2f7;
  --s1:rgba(255,255,255,.82);
  --s2:rgba(255,255,255,.55);
  --s3:rgba(0,0,0,.06);
  --bd:rgba(0,0,0,.1);
  --tx:#1c1c1e;
  --tx2:#3a3a3c;
  --mu:#585860;
  --win:#176b27;  --winb:rgba(23,107,39,.09);   --winc:rgba(23,107,39,.28);
  --lose:#c52222; --loseb:rgba(197,34,34,.08);  --losec:rgba(197,34,34,.25);
  --tie:#8a4900;  --tieb:rgba(138,73,0,.08);    --tiec:rgba(138,73,0,.28);
  --acc:#c0001a;  --accb:rgba(192,0,26,.09);
  --ov:rgba(0,0,0,.42);
  --shadow:0 4px 24px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.08);
}
[data-lang=ja]{--body:'Noto Sans JP',system-ui,sans-serif}
[data-lang=ko]{--body:'Noto Sans KR',system-ui,sans-serif}
[data-lang=zh]{--body:'Noto Sans TC',system-ui,sans-serif}

/* ══ RESET ══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--body);background:var(--bg);color:var(--tx);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  min-height:100vh;overflow-x:hidden;
  transition:background-color .2s ease,color .2s ease;
}
button{cursor:pointer;font-family:inherit;border:none;background:none;display:inline-flex;align-items:center;justify-content:center}
input,select{font-family:inherit}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

/* ══ APP ════════════════════════════════════════ */
#app{max-width:1360px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}

/* ══ HEADER ════════════════════════════════════ */
.hdr{
  display:flex;align-items:center;gap:6px;padding:0 16px;height:48px;
  background:rgba(9,9,9,.82);
  border-bottom:1px solid var(--bd);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;flex-shrink:0;
}
[data-theme=light] .hdr{background:rgba(242,242,247,.82)}
.logo{flex-shrink:0;display:flex;align-items:center;user-select:none}
.logo-img{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:block}
.logo-text{display:none}
.logo-s{display:none}
.nav-tabs{display:flex;gap:1px;flex:1;min-width:0;padding:0 6px}
.tab{
  padding:0 11px;height:30px;border-radius:7px;border:none;
  background:transparent;color:var(--tx2);font-size:12px;font-weight:500;
  white-space:nowrap;transition:color var(--tr),background var(--tr);gap:4px;
  letter-spacing:-.01em;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--tx);background:var(--s2)}
.tab.on{color:var(--tx);background:var(--s2)}
.hdr-end{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.lang-sel{
  background:transparent;border:1px solid var(--bd);border-radius:7px;
  color:var(--tx2);padding:3px 7px;font-size:11px;outline:none;cursor:pointer;height:30px;
  transition:border-color var(--tr);
}
.lang-sel:hover{border-color:rgba(255,255,255,.18)}
.ico-btn{
  width:30px;height:30px;border-radius:7px;border:1px solid var(--bd);
  background:transparent;color:var(--tx2);font-size:13px;flex-shrink:0;
  transition:background var(--tr),color var(--tr),border-color var(--tr);
}
.ico-btn:hover{background:var(--s2);color:var(--tx);border-color:rgba(255,255,255,.15)}
.ico-btn.accent:hover{background:var(--accb);border-color:var(--acc);color:var(--acc)}

/* ══ MAIN ═══════════════════════════════════════ */
.main{flex:1;padding:14px 16px}
.view{display:none}
.view.on{display:block}

/* ══ CALCULATOR ═════════════════════════════════*/
.calc-grid{display:grid;grid-template-columns:1fr 340px;gap:14px;align-items:start}

/* Table card */
.tcard{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(0,0,0,.18);
}
.tcard-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px;
}
.tcard-title{font-size:11px;font-weight:600;color:var(--tx);letter-spacing:-.01em}
.tcard-meta{font-size:11px;color:var(--tx2);font-family:var(--mono);letter-spacing:-.01em}
.btn-row{display:flex;gap:5px;align-items:center}
.btn{
  padding:0 10px;height:26px;border-radius:6px;border:1px solid var(--bd);
  background:var(--s2);color:var(--tx2);font-size:11px;font-weight:500;white-space:nowrap;
  transition:background var(--tr),color var(--tr),border-color var(--tr);gap:4px;
  letter-spacing:-.01em;
}
.btn:hover{background:var(--s3);color:var(--tx)}
.btn.red{border-color:var(--losec);color:var(--lose);background:var(--loseb)}
.btn.red:hover{filter:brightness(1.1)}
.btn.sec{background:var(--s2);color:var(--tx2);border-color:var(--bd)}
.btn.sec:disabled{opacity:.3;cursor:default}
.btn:disabled{opacity:.3;pointer-events:none}
.player-count{font-size:11px;color:var(--mu);font-family:var(--mono)}

/* ── FELT ── */
.felt-wrap{padding:12px 14px}
.felt{
  background:radial-gradient(ellipse 68% 75% at 50% 36%,#1d5218 0%,#102e0c 55%,#071505 100%);
  border-radius:80px;
  border:4px solid #180b01;
  box-shadow:0 0 0 1px rgba(255,255,255,.04),inset 0 1px 60px rgba(0,0,0,.55),0 6px 28px rgba(0,0,0,.55);
  padding:20px 28px;max-width:860px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  min-height:280px;justify-content:center;position:relative;
}
.felt::before{
  content:'';position:absolute;inset:8px;border-radius:72px;
  border:1px solid rgba(255,255,255,.05);pointer-events:none;
}

.p-row{display:flex;gap:8px;justify-content:center;align-items:flex-end;flex-wrap:wrap;width:100%;max-width:100%}
.player{display:flex;flex-direction:column;align-items:center;gap:4px}
.p-lbl{
  font-size:8px;font-weight:600;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.07em;
  padding:1px 6px;border-radius:3px;white-space:nowrap;
}
.p-lbl.hero{color:rgba(255,210,70,.85);background:rgba(0,0,0,.45);font-weight:700}
.p-cards{display:flex;gap:3px}
.p-eq{
  font-family:var(--mono);font-size:11px;font-weight:600;
  display:inline-block;
  min-width:50px;text-align:center;padding:2px 8px;border-radius:20px;
  background:rgba(0,0,0,.52);color:rgba(255,255,255,.8);
  letter-spacing:-.02em;white-space:nowrap;line-height:1.6;
}
.p-eq.ew{background:rgba(50,215,75,.25);color:#32d74b;border:1px solid rgba(50,215,75,.3)}
.p-eq.el{background:rgba(255,69,58,.2);color:#ff7870;border:1px solid rgba(255,69,58,.25)}
.p-eq-tie{font-size:9px;opacity:.75;font-weight:400;display:block;line-height:1.4}

/* Community zone */
.comm-zone{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%;padding:4px 0}
.comm-lbl{font-size:7px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.14em}
.comm-cards{display:flex;gap:4px;justify-content:center}
.street-row{display:flex;gap:4px}
.slbl{width:48px;text-align:center;font-size:7px;font-family:var(--mono);color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.04em}

/* ── CARDS ── */
.card-wrap{position:relative;display:inline-flex;flex-shrink:0}
.card-clr{
  position:absolute;top:4px;right:4px;
  width:14px;height:14px;border-radius:3px;
  border:none;background:transparent;color:transparent;
  font-size:9px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;
  transition:opacity .18s,background .18s,color .18s;
  z-index:10;
}
.card-clr::after{content:'';position:absolute;inset:-10px;border-radius:50%}
.card-wrap:hover .card-clr,.card-wrap.touched .card-clr{
  opacity:1;background:rgba(0,0,0,.5);color:rgba(255,255,255,.75);
}
.card-clr:hover{background:rgba(180,0,0,.8)!important;color:#fff!important;opacity:1!important}
.card{
  width:48px;height:68px;
  background:#fafafa;border-radius:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 0 .5px rgba(0,0,0,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;user-select:none;
  transition:transform .1s,box-shadow .1s;
  position:relative;z-index:2;
}
.card:hover{transform:translateY(-4px);box-shadow:0 6px 18px rgba(0,0,0,.4)}
.card.ring{box-shadow:0 0 0 2px var(--acc),0 4px 12px rgba(208,0,27,.3);transform:translateY(-2px)}
.card .cr{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1}
.card .cs{font-size:16px;line-height:1;margin-top:1px}
.card.red .cr,.card.red .cs{color:#c62828}
.card.blk .cr,.card.blk .cs{color:#18181b}
.empty-slot{
  width:48px;height:68px;border-radius:6px;
  border:1.5px dashed rgba(255,255,255,.18);
  background:rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;font-size:16px;color:rgba(255,255,255,.22);
  transition:all var(--tr);user-select:none;
  position:relative;z-index:2;touch-action:manipulation;
}
.empty-slot:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.5);transform:translateY(-3px)}
.empty-slot.ring{border-color:var(--acc);background:rgba(208,0,27,.08);color:var(--acc);box-shadow:0 0 0 1px var(--acc)}
.empty-slot.locked{opacity:.18;cursor:not-allowed;font-size:13px;border-style:solid;pointer-events:none}

/* Per-player controls */
.p-lbl-wrap{display:flex;align-items:center;gap:4px;justify-content:center}
.p-del{
  width:15px;height:15px;border-radius:3px;
  border:none;background:transparent;
  color:rgba(255,69,58,.55);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:color var(--tr),background var(--tr);line-height:1;
  position:relative;
}
.p-del::after{content:'';position:absolute;inset:-14px;border-radius:50%}
.p-del:hover{color:#fff;background:var(--lose)}
.p-add-btn{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.07);
  color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  align-self:center;
  transition:all var(--tr);
  flex-shrink:0;
}
.p-add-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);color:#fff;transform:scale(1.1)}

/* Table foot */
.tbl-foot{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-top:1px solid var(--bd);
  flex-wrap:wrap;gap:6px;
}

/* ══ SETUP OVERLAY ═══════════════════════════════*/
.setup-ov{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.setup-card{
  background:rgba(28,28,30,.9);border:1px solid rgba(255,255,255,.1);
  border-radius:18px;padding:28px 24px;text-align:center;max-width:400px;width:100%;
  box-shadow:0 24px 64px rgba(0,0,0,.55);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  animation:tutIn .22s cubic-bezier(.34,1.3,.64,1);
}
[data-theme=light] .setup-card{background:rgba(255,255,255,.9)}
.setup-icon{font-size:26px;letter-spacing:5px;margin-bottom:12px;opacity:.6}
.setup-title{font-size:16px;font-weight:600;color:var(--tx);margin-bottom:8px;letter-spacing:-.02em}
.setup-sub{font-size:12px;color:var(--tx2);margin-bottom:22px}
.setup-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;width:100%;max-width:360px}
.setup-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:62px;border-radius:10px;
  border:1px solid var(--bd);background:var(--s1);
  cursor:pointer;transition:all var(--tr);gap:3px;
}
.setup-btn:hover{background:var(--accb);border-color:rgba(208,0,27,.4);transform:translateY(-1px)}
.sn{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;color:var(--tx)}
.sl{font-size:9px;font-family:var(--mono);color:var(--mu);letter-spacing:.02em;white-space:nowrap}
.setup-btn:hover .sn,.setup-btn:hover .sl{color:var(--acc)}

/* ══ STATS SIDEBAR ═══════════════════════════════*/
.stats-col{display:flex;flex-direction:column;gap:8px}
.panel{
  background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:background var(--tr),border-color var(--tr);
  box-shadow:0 1px 3px rgba(0,0,0,.18);
}
.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--bd);
}
.ph-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2)}
.ph-badge{font-size:9px;font-weight:500;padding:1px 8px;border-radius:10px;border:1px solid}
.pb{padding:14px 20px}

/* Equity */
.eq-row{display:flex;align-items:baseline;justify-content:center;gap:2px;margin-bottom:10px}
.eq-n{font-family:var(--mono);font-size:54px;font-weight:700;line-height:1;letter-spacing:-.04em;transition:color .25s}
.eq-s{font-family:var(--mono);font-size:24px;opacity:.55;transition:color .25s}
.eq-track{height:3px;background:var(--s3);border-radius:2px;overflow:hidden;display:flex;margin-top:12px}
.ew{background:var(--win);transition:flex .4s ease}
.et{background:var(--tie)}
.el{background:var(--lose);flex:1;transition:flex .4s ease}
.wtl{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:10px}
.wbox{border-radius:8px;padding:10px 8px;text-align:center;background:var(--s2);border:1px solid transparent}
.wbox.w{background:var(--winb);border-color:var(--winc)}
.wbox.t{background:var(--tieb);border-color:var(--tiec)}
.wbox.l{background:var(--loseb);border-color:var(--losec)}
.wn{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1;margin-bottom:3px}
.wbox.w .wn{color:var(--win)}
.wbox.t .wn{color:var(--tie)}
.wbox.l .wn{color:var(--lose)}
.wk{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;display:block}
.hint{text-align:center;padding:24px 20px;color:var(--tx2);font-size:12px;line-height:1.9;letter-spacing:.01em}
.spin-r{display:none;align-items:center;gap:6px;font-size:10px;color:var(--mu);margin-top:6px}
.spin-r.on{display:flex}
.spin{width:10px;height:10px;border:1.5px solid var(--bd);border-top-color:var(--acc);border-radius:50%;animation:sp .5s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Hand panel */
.hpb{padding:14px 20px}
.hand-name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hand-cat-icon{font-size:18px;line-height:1;flex-shrink:0}
.hand-name{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--tx);line-height:1.2;letter-spacing:-.02em}
.hand-sub{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.hand-pips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.hand-pip{
  font-family:var(--mono);font-size:13px;font-weight:700;
  padding:3px 7px;border-radius:5px;line-height:1.1;
  background:var(--s2);border:1px solid transparent;
  opacity:.3;transition:opacity .15s;
}
.hand-pip.best{opacity:1;border-width:1px}
.hand-pip.r{color:#e05252}
.hand-pip.r.best{background:rgba(224,82,82,.1);border-color:rgba(224,82,82,.35)}
.hand-pip.b{color:var(--tx)}
.hand-pip.b.best{background:var(--s3);border-color:var(--bd)}
.hand-legend{display:flex;gap:12px;font-size:9px;margin-top:2px;color:var(--mu)}
.legend-best{color:var(--tx2)}
.hand-pf{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:12px;padding:8px 12px;background:var(--s2);border-radius:var(--rs);
  border:1px solid var(--bd);
}
.hand-pf-lbl{font-size:11px;color:var(--tx2)}
.hand-pf-n{font-family:var(--mono);font-weight:700;color:var(--acc);font-size:15px}
.hand-cat-tag{
  font-size:9px;color:var(--tx2);background:var(--s2);
  border:1px solid var(--bd);border-radius:4px;
  padding:2px 8px;display:inline-block;margin-bottom:6px;font-weight:500;
}
.hand-preflop-hint{
  font-size:10px;color:var(--mu);margin-top:8px;text-align:center;
  padding:5px 8px;background:var(--s2);border-radius:var(--rs);
  border:1px solid var(--bd);line-height:1.5;
}

/* Outs panel */
.outs-pb{padding:14px 20px}
.outs-header{display:flex;align-items:center;gap:16px;padding-bottom:12px;border-bottom:1px solid var(--bd);margin-bottom:12px}
.outs-count-block{display:flex;flex-direction:column;align-items:center;min-width:56px}
.outs-num{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--tx);line-height:1;letter-spacing:-.04em}
.outs-unit{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.outs-prob-grid{display:flex;flex-direction:column;gap:7px;flex:1}
.outs-prob-item{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.outs-prob-pct{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--tx);line-height:1}
.outs-prob-lbl{font-size:10px;color:var(--tx2);line-height:1.3;text-align:right}
.outs-rule{font-size:10px;color:var(--tx2);padding:5px 8px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd);margin-bottom:6px;line-height:1.5}
.outs-cards-lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}

}
.out-pip.r{color:#e05252;border-color:rgba(224,82,82,.25);background:rgba(224,82,82,.07)}
.out-pip.b{color:var(--tx)}

.vo-label{font-size:9px;color:var(--lose);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.vo-row{display:flex;align-items:center;gap:10px}
.vo-n{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--lose);line-height:1;min-width:30px}

.vo-stat{font-size:11px;color:var(--tx2)}

.vo-tag{font-size:9px;background:var(--loseb);border-radius:3px;padding:0 5px;margin-left:3px;vertical-align:middle;color:var(--lose);border:1px solid var(--losec)}
.approx-badge{background:var(--s2)!important;color:var(--mu)!important;border-color:var(--bd)!important;cursor:help}

.pi{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.inp{

.rq-btn{
  font-size:10px;padding:3px 10px;height:24px;border-radius:5px;

}
.rq-btn:hover{background:var(--s3);color:var(--tx)}

/* ══ PICKER MODAL ════════════════════════════════*/
.ov{
  position:fixed;inset:0;background:var(--ov);z-index:300;
  display:none;align-items:flex-end;justify-content:center;
  padding:12px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
@media(min-width:721px){.ov{align-items:center}}
.ov.on{display:flex}
.modal{
  background:rgba(28,28,30,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;width:100%;max-width:600px;max-height:90dvh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:var(--shadow);animation:up .18s ease;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}

@keyframes up{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

}

.modal-sub{font-size:11px;color:var(--acc);font-family:var(--mono);margin-top:1px}
.modal-x{
  width:26px;height:26px;border-radius:var(--rs);border:1px solid var(--bd);
  background:var(--s2);color:var(--tx2);font-size:12px;flex-shrink:0;
  transition:all var(--tr);
}
.modal-x:hover{background:var(--lose);border-color:var(--lose);color:#fff}
.modal-scroll{padding:12px 14px;overflow-y:auto;overflow-x:auto}
.picker-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}

/* Suit rows */
.suit-r{display:flex;gap:2px;align-items:center;margin-bottom:6px;min-width:0}
.suit-r:last-child{margin-bottom:0}
.suit-ico{width:20px;font-size:13px;text-align:center;flex-shrink:0}
.suit-ico.r{color:#c62828}
.pk{
  width:36px;height:50px;background:#fafafa;border-radius:6px;border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.2),0 0 0 .5px rgba(0,0,0,.08);
  transition:transform .08s,opacity .1s;gap:0;
  position:relative;touch-action:manipulation;
}

.pk.blk .pr2,.pk.blk .ps{color:#18181b}
.pk.used{opacity:.12;cursor:not-allowed;box-shadow:none;pointer-events:none}
.pk::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);min-width:44px;min-height:44px;width:100%;height:100%}

/* ══ RANGE VIEW ══════════════════════════════════*/
.range-layout{display:grid;grid-template-columns:1fr 230px;gap:16px;align-items:start}
.range-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}

.mc:active{transform:scale(.82)!important;filter:brightness(1.25)}

.mc.sel::after{content:'';position:absolute;inset:0;border-radius:3px;border:2px solid rgba(255,255,255,.8)}
.rp{background:#a33e18}
.ra{background:#1a6235}
.rb{background:#13508a}
.rc2{background:#533691}
.rd{background:#424242}
.rf{background:#1a1a1a;color:rgba(255,255,255,.1)}

.range-side{display:flex;flex-direction:column;gap:10px}
.stat-big{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--win);line-height:1;letter-spacing:-.03em}
.stat-sub{font-size:11px;color:var(--mu);margin-top:2px}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pos-btn{

}
.pos-btn:hover{background:var(--s3);color:var(--tx)}

/* ══ ODDS VIEW ═══════════════════════════════════*/

.dtbl td{padding:7px 10px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:middle}
.dtbl tr:last-child td{border-bottom:none}
.dtbl tr:hover td{background:var(--s2)}
.dtbl td.bd{color:var(--tx);font-weight:600}
.dtbl td.mn{font-family:var(--mono);color:var(--acc)}
.dtbl td.gd{color:var(--win);font-family:var(--mono);font-weight:700}
.dtbl td.wn2{color:var(--lose);font-family:var(--mono)}
.mb{display:inline-flex;align-items:center;padding:1px 7px;border-radius:10px;font-family:var(--mono);font-size:10px;font-weight:700;border:1px solid}
.mb.f{background:var(--winb);color:var(--win);border-color:transparent}
.mb.d{background:var(--loseb);color:var(--lose);border-color:transparent}
.hb-wrap{display:flex;align-items:center;gap:8px}
.hb-bg{flex:1;background:var(--s3);border-radius:2px;height:4px;overflow:hidden;min-width:50px}
.hb{height:100%;border-radius:2px}
.hb-pct{font-family:var(--mono);font-size:10px;width:34px;text-align:right}
.hb-n{font-family:var(--mono);font-weight:700;font-size:11px;width:44px;color:var(--tx)}
.tip-g,.tip-b{padding:9px 12px;border-radius:var(--rs);font-size:11px;line-height:1.7;margin-top:10px;background:var(--s2);color:var(--tx2)}
.tip-g b,.tip-b b{color:var(--tx)}

/* ══ SMALL MODAL ═════════════════════════════════*/
.sm-modal{
  background:rgba(28,28,30,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r);width:100%;max-width:480px;
  box-shadow:var(--shadow);animation:up .18s ease;

}

.sm-modal .modal-hdr{border-radius:var(--r) var(--r) 0 0}
.sm-body{padding:14px 16px}
.code-box{

  padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--tx2);
  overflow-x:auto;white-space:pre;line-height:1.7;margin-bottom:8px;
}
.copy-btn{
  width:100%;padding:7px;border-radius:7px;border:1px solid var(--bd);
  background:var(--s2);color:var(--tx);font-size:12px;font-weight:500;
  transition:all var(--tr);
}
.copy-btn:hover{background:var(--accb);border-color:var(--acc);color:var(--acc)}
.copy-btn.ok{background:var(--winb);border-color:var(--winc);color:var(--win)}
.note{font-size:10px;color:var(--mu);margin-top:8px;line-height:1.6}
.share-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.share-btn{padding:9px 12px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s2);color:var(--tx2);font-size:12px;font-weight:500;transition:all var(--tr);gap:6px}
.share-btn:hover{background:var(--s3);color:var(--tx)}
.share-url{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:7px 10px;font-family:var(--mono);font-size:11px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.tut-ov{position:fixed;inset:0;z-index:500;display:none;background:rgba(0,0,0,.75);backdrop-filter:blur(2px);align-items:center;justify-content:center}

.tut-box{
  background:rgba(28,28,30,.95);border:1px solid rgba(255,255,255,.1);
  border-radius:16px;padding:20px;width:320px;max-width:calc(100vw - 32px);
  box-shadow:0 16px 48px rgba(0,0,0,.6);
  animation:tutIn .22s cubic-bezier(.34,1.3,.64,1);flex-shrink:0;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}

.tut-step{font-family:var(--mono);font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.tut-icon{font-size:26px;margin-bottom:8px;display:block;line-height:1}
.tut-title{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:5px;line-height:1.3;letter-spacing:-.02em}

.tut-btns{display:flex;gap:5px}
.tut-btn{padding:5px 13px;border-radius:var(--rs);border:1px solid var(--bd);background:var(--s2);color:var(--tx2);font-size:12px;font-weight:500;transition:all var(--tr)}

═══════════════════════════════════════════════ */
var RK=['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
var SU=['\u2663','\u2666','\u2665','\u2660'];
var RED=[false,true,true,false];
function cR(c){return c>>2} function cS(c){return c&3}
function mk(r,s){return(r<<2)|s}
function cStr(c){return c<0?'?':RK[cR(c)]+SU[cS(c)]}

function eval5(cs){
  if(!cs||cs.length<5)return 0;
  var r=[cR(cs[0]),cR(cs[1]),cR(cs[2]),cR(cs[3]),cR(cs[4])].sort(function(a,b){return b-a});
  var s=[cS(cs[0]),cS(cs[1]),cS(cs[2]),cS(cs[3]),cS(cs[4])];
  var fl=s[0]===s[1]&&s[1]===s[2]&&s[2]===s[3]&&s[3]===s[4];
  var f=new Array(13).fill(0);for(var i=0;i<5;i++)f[r[i]]++;
  var u=0;for(var i=0;i<13;i++)if(f[i]>0)u++;
  var st=-1;
  if(u===5){if(r[0]-r[4]===4)st=r[0];else if(r[0]===12&&r[1]===3&&r[2]===2&&r[3]===1&&r[4]===0)st=3;}
  if(fl&&st>=0)return st===12?9000000:8000000+st;
  var g=[];for(var rk=12;rk>=0;rk--)if(f[rk]>0)g.push([f[rk],rk]);
  g.sort(function(a,b){return b[0]-a[0]||b[1]-a[1]});
  var c0=g[0][0],r0=g[0][1];
  var c1=g.length>1?g[1][0]:0,r1=g.length>1?g[1][1]:0;
  var r2=g.length>2?g[2][1]:0,r3=g.length>3?g[3][1]:0,r4=g.length>4?g[4][1]:0;
  if(c0===4)return 7000000+r0*13+r1;
  if(c0===3&&c1===2)return 6000000+r0*13+r1;
  if(fl)return 5000000+r0*28561+r1*2197+r2*169+r3*13+r4;
  if(st>=0)return 4000000+st;
  if(c0===3)return 3000000+r0*169+r1*13+r2;
  if(c0===2&&c1===2){var hi=Math.max(r0,r1),lo=Math.min(r0,r1);return 2000000+hi*169+lo*13+r2}
  if(c0===2)return 1000000+r0*2197+r1*169+r2*13+r3;
  return r0*28561+r1*2197+r2*169+r3*13+r4;
}
function best5(cards){
  var n=cards.length;if(n<5)return 0;if(n===5)return eval5(cards);
  var best=0;
  for(var i=0;i<n-1;i++)for(var j=i+1;j<n;j++){
    var f=[];for(var k=0;k<n;k++)if(k!==i&&k!==j)f.push(cards[k]);
    if(f.length===5){var sc=eval5(f);if(sc>best)best=sc;}
  }
  return best;
}
function best5Cards(cards){
  var n=cards.length;
  if(n<5)return cards.slice();
  if(n===5)return cards.slice();
  var best=0,bestF=cards.slice(0,5);
  for(var i=0;i<n-1;i++)for(var j=i+1;j<n;j++){
    var f=[];for(var k=0;k<n;k++)if(k!==i&&k!==j)f.push(cards[k]);
    if(f.length===5){var sc=eval5(f);if(sc>best){best=sc;bestF=f.slice();}}
  }
  return bestF;
}
function hcat(sc){return Math.min(9,Math.floor(sc/1000000))}
function hname(sc){return tx('handRanks')[hcat(sc)]||'?'}

function countOuts(hc,vc,cm){
  if(cm.length<3||cm.length>=5)return null;
  var u={};hc.forEach(function(c){u[c]=1});vc.forEach(function(c){u[c]=1});cm.forEach(function(c){u[c]=1});
  var deck=[];for(var i=0;i<52;i++)if(!u[i])deck.push(i);
  if(best5(hc.concat(cm))>best5(vc.concat(cm)))return null;
  var outCards=[];
  for(var i=0;i<deck.length;i++){
    var c=deck[i];
    if(best5(hc.concat(cm).concat([c]))>best5(vc.concat(cm).concat([c])))outCards.push(c);
  }
  return outCards; /* array of card integers; length = outs count */
}

/* ═══════════════════════════════════════════════
   § 3  EQUITY ENGINE
═══════════════════════════════════════════════ */
function calcEq(players,comm){
  var cm=comm.filter(function(c){return c>=0});
  var valid=players.filter(function(p){return p[0]>=0&&p[1]>=0});
  if(valid.length<2)return null;
  var u={};valid.forEach(function(p){u[p[0]]=1;u[p[1]]=1});cm.forEach(function(c){u[c]=1});
  var deck=[];for(var i=0;i<52;i++)if(!u[i])deck.push(i);
  var nd=5-cm.length,n=valid.length;
  var wins=new Array(n).fill(0),ties=new Array(n).fill(0),total=0;
  function run(ex){
    var bd=cm.concat(ex);
    var sc=valid.map(function(p){return best5(p.concat(bd))});
    var mx=0;for(var i=0;i<n;i++)if(sc[i]>mx)mx=sc[i];
    var cnt=sc.filter(function(s){return s===mx}).length;
    for(var i=0;i<n;i++)if(sc[i]===mx){if(cnt>1)ties[i]++;else wins[i]++;}
    total++;
  }
  if(nd===0){run([]);}
  else if(nd===1){for(var i=0;i<deck.length;i++)run([deck[i]]);}
  else if(nd===2){
    if(deck.length<=48){/* Exact enumeration for flop (all player counts) — max C(48,2)=1128 combos */
      for(var i=0;i<deck.length;i++)for(var j=i+1;j<deck.length;j++)run([deck[i],deck[j]]);
    } else{for(var it=0;it<5000;it++){var d=deck.slice();for(var k=0;k<2;k++){var jj=k+Math.floor(Math.random()*(d.length-k));var t=d[k];d[k]=d[jj];d[jj]=t;}run(d.slice(0,2));}}
  } else {
    var n2=players.length; var IT=nd>=5?(n2>4?100000:50000):nd>=3?20000:10000;
    for(var it=0;it<IT;it++){var d2=deck.slice();for(var k=0;k<nd;k++){var jj2=k+Math.floor(Math.random()*(d2.length-k));var t2=d2[k];d2[k]=d2[jj2];d2[jj2]=t2;}run(d2.slice(0,nd));}
  }
  var exact=(nd===0)||(nd===1)||(nd===2&&deck.length<=48);
  return {results:valid.map(function(_,i){return{win:wins[i]/total,tie:ties[i]/total,lose:1-wins[i]/total-ties[i]/total}}),exact:exact,samples:total};
}

  var sp=G.tmr?' on':'';

  var partialCard=G.players.some(function(p){return(p.cards[0]>=0)!==(p.cards[1]>=0);});
  if(!allHaveCards||!G.eq){
    var hintMsg=partialCard?tx('incompleteCard'):tx('nocard');

      el2.textContent=(isAp?'≈':'')+v.toFixed(isAp?0:1);

function renderHandPanel(){
  var hc=G.players[0].cards.filter(function(c){return c>=0});
  var cm=G.comm.filter(function(c){return c>=0});
  if(hc.length<2)return'';
  var body='';
  if(cm.length>=3){
    var allCards=hc.concat(cm);
    var sc=best5(allCards);
    var best5Cs=best5Cards(allCards);
    /* Mark which cards are in the best hand */
    var used={};best5Cs.forEach(function(c){used[c]=1;});
    var cardPips=allCards.map(function(c){
      var isRed=RED[cS(c)];
      var inBest=used[c];
      var cls='hand-pip '+(isRed?'r':'b')+(inBest?' best':'');
      return'<span class="'+cls+'" title="'+(inBest?tx('inBestHand'):tx('notInBest'))+'">'+RK[cR(c)]+SU[cS(c)]+'</span>';
    }).join('');
    /* Category icon */
    var cat=hcat(sc);
    var catIcons=['🃏','✌️','✌️','🔥','🌀','♠️','🏆','💎','🌊','👑'];
    body='<div class="hand-name-row">'
      +'<span class="hand-cat-icon">'+catIcons[cat]+'</span>'
      +'<span class="hand-name">'+hname(sc)+'</span>'
      +'</div>'
      +'<div class="hand-sub">'+tx('bestHandLabel')+'</div>'
      +'<div class="hand-pips">'+cardPips+'</div>'
      +'<div class="hand-legend"><span class="legend-best">■ '+tx('inBestHand')+'</span><span class="legend-dim">■ '+tx('notInBest')+'</span></div>';
  } else {
    /* Preflop: show hand key + equity vs random */
    var key=holeKey(hc[0],hc[1]);
    var pfe=PFE[key];
    /* Classify hole cards */
    var r1=cR(hc[0]),r2=cR(hc[1]),suited=cS(hc[0])===cS(hc[1]);
    var hiR=Math.max(r1,r2),loR=Math.min(r1,r2);
    var hcat2='';
    if(r1===r2)hcat2=tx('catPair');
    else if(hiR>=9&&loR>=9)hcat2=tx('catBroadway')+(suited?tx('catSuited'):'');
    else if(hiR===12)hcat2=tx('catSuitedAce').replace('{s}',suited?tx('catSuited'):tx('catOffsuit'));
    else if(hiR===r1+1||hiR===r1-1)hcat2=(suited?tx('catSC'):tx('catConnector'));
    else if(suited)hcat2=tx('catSuited');
    else hcat2=tx('catOffsuit');
    body='<div class="hand-name-row">'
      +'<span class="hand-name" style="font-size:20px;letter-spacing:1px">'+key+'</span>'
      +'</div>'
      +'<div class="hand-cat-tag">'+hcat2+'</div>'
      +(pfe?'<div class="hand-pf"><span class="hand-pf-lbl">'+tx('vsRandom')+'</span><span class="hand-pf-n">~'+pfe+'%</span></div>':'')
      +'<div class="hand-preflop-hint">'+tx('preflopHint')+'</div>';
  }
  return'<div class="panel"><div class="ph"><span class="ph-title">'+tx('hand')+'</span></div>'
    +'<div class="pb hpb">'+body+'</div></div>';
}

function renderOutsPanel(){
  var hc=G.players[0].cards.filter(function(c){return c>=0});
  var cm=G.comm.filter(function(c){return c>=0});
  /* Collect all villains with 2 cards dealt */
  var villains=[];
  for(var vi=1;vi<G.players.length;vi++){
    var vc2=G.players[vi].cards.filter(function(c){return c>=0});
    if(vc2.length===2)villains.push({idx:vi,cards:vc2});
  }
  if(cm.length===5&&hc.length>=2){
    /* River dealt — show final hand comparison */
    var heroScore=best5(hc.concat(cm));var heroName=handName(heroScore);
    var resultParts=[];
    for(var vi2=0;vi2<villains.length;vi2++){
      var vScore=best5(villains[vi2].cards.concat(cm));var vName=handName(vScore);
      var cmp=heroScore>vScore?'<span style="color:var(--win)">✓ '+tx('ahead')+'</span>':heroScore<vScore?'<span style="color:var(--lose)">✗ '+tx('behind')+'</span>':'<span style="color:var(--tie)">= '+tx('tied')+'</span>';
      resultParts.push('<div class="outs-rule" style="margin-bottom:4px">'+tx('vill')+' '+(vi2+1)+': '+vName+' '+cmp+'</div>');
    }
    return'<div class="panel"><div class="ph"><span class="ph-title">'+tx('outs')+'</span></div><div class="pb outs-pb"><div class="outs-ahead" style="margin-bottom:8px">'+tx('riverDone')+'</div>'+resultParts.join('')+'</div></div>';
  }
  if(hc.length<2||villains.length<1||(cm.length!==3&&cm.length!==4))return'';
  /* Find the villain Hero is behind and hardest to catch (fewest outs) */
  /* Also check all villains — hero might be ahead of V[0] but behind V[2] */
  var bestOuts=null,bestOutsVIdx=villains[0].idx,vc=villains[0].cards;
  for(var vi=0;vi<villains.length;vi++){
    var vtry=villains[vi].cards;
    var otry=countOuts(hc,vtry,cm);
    if(otry!==null){ /* hero is behind this villain */
      if(bestOuts===null||otry.length<bestOuts.length){bestOuts=otry;bestOutsVIdx=villains[vi].idx;vc=vtry;}
    }
  }
  var outCards=bestOuts;
  var body='';
  if(outCards!==null){
    var n=outCards.length;
    /* Count ALL known cards across every player for accurate probability */
    var _allKn={};hc.forEach(function(c){_allKn[c]=1;});
    G.players.forEach(function(p){p.cards.forEach(function(c){if(c>=0)_allKn[c]=1;});});
    cm.forEach(function(c){_allKn[c]=1;});
    var rem=52-Object.keys(_allKn).length;
    /* Exact probability for next card */
    var pctNext=(n/rem*100).toFixed(1);
    /* Exact probability by showdown */
    var pctShow;
    if(cm.length===3){
      /* 2 cards to come: P = 1 - (miss turn)*(miss river) */
      pctShow=(100*(1-((rem-n)/rem)*((rem-1-n)/(rem-1)))).toFixed(1);
    } else {
      /* 1 card to come: same as next */
      pctShow=pctNext;
    }
    /* Rule of 4/2 approximation */
    var ro=cm.length===3?(n*4):(n*2);
    var street=cm.length===3?tx('onTurn'):tx('onRiver');
    var streetLabel=cm.length===3?tx('byShowdown'):tx('onRiver');
    var pips=outCards.map(function(c){
      var suit=SU[cS(c)];
      var isRed=RED[cS(c)];
      return'<span class="out-pip '+(isRed?'r':'b')+'">'+RK[cR(c)]+suit+'</span>';
    }).join('');
    body=
      '<div class="outs-header">'
      +'<div class="outs-count-block">'
      +'<span class="outs-num">'+n+'</span>'
      +'<span class="outs-unit">'+tx('outs')+'</span>'
      +'</div>'
      +'<div class="outs-prob-grid">'
      +'<div class="outs-prob-item">'
      +'<span class="outs-prob-pct">'+pctNext+'%</span>'
      +'<span class="outs-prob-lbl">'+tx('nextCard')+'</span>'
      +'</div>'
      +(cm.length===3?'<div class="outs-prob-item">'
        +'<span class="outs-prob-pct">'+pctShow+'%</span>'
        +'<span class="outs-prob-lbl">'+tx('byShowdown')+'</span>'
        +'</div>':'')
      +'</div>'
      +'</div>'
      +'<div class="outs-rule">'+tx('rule42').replace('{ro}',ro).replace('{street}',cm.length===3?tx('r42flop'):tx('r42turn'))+'</div>'
      +(pips?'<div class="outs-cards-lbl">'+tx('outCards')+'</div><div class="out-cards">'+pips+'</div>':'');
  } else {
    /* Hero is ahead — find most dangerous villain's outs */
    var worstV=null,worstN=0;
    for(var vi=0;vi<villains.length;vi++){
      var vct=villains[vi].cards;
      var u2={};hc.forEach(function(c){u2[c]=1;});vct.forEach(function(c){u2[c]=1;});cm.forEach(function(c){u2[c]=1;});
      var deck2=[];for(var i=0;i<52;i++)if(!u2[i])deck2.push(i);
      var vOuts=[];
      for(var i=0;i<deck2.length;i++){
        var c=deck2[i];
        if(best5(vct.concat(cm).concat([c]))>best5(hc.concat(cm).concat([c])))vOuts.push(c);
      }
      if(vOuts.length>worstN){worstN=vOuts.length;worstV=villains[vi];}
    }
    var vn=worstN;
    var _allKn2={};hc.forEach(function(c){_allKn2[c]=1;});
    G.players.forEach(function(p){p.cards.forEach(function(c){if(c>=0)_allKn2[c]=1;});});
    cm.forEach(function(c){_allKn2[c]=1;});
    var vrem=52-Object.keys(_allKn2).length;
    var vpct=(vn/vrem*100).toFixed(1);
    var vpctShow=cm.length===3?(100*(1-((vrem-vn)/vrem)*((vrem-1-vn)/(vrem-1)))).toFixed(1):vpct;
    var multiBadge=villains.length>1?(' <span class="vo-tag">'+tx('vill')+' '+(worstV?worstV.idx:1)+'</span>'):'';
    body='<div class="outs-ahead">'+tx('outsAhead')+'</div>'
      +'<div class="villain-outs">'
      +'<div class="vo-label">'+tx('villOutsLabel')+multiBadge+'</div>'
      +'<div class="vo-row">'
      +'<span class="vo-n">'+vn+'</span>'
      +'<div class="vo-stats">'
      +'<span class="vo-stat"><b>'+vpct+'%</b> '+tx('nextCard')+'</span>'
      +(cm.length===3?'<span class="vo-stat"><b>'+vpctShow+'%</b> '+tx('byShowdown')+'</span>':'')
      +'</div>'
      +'</div>'
      +'</div>';
  }
  var vsTag=villains.length>1&&outCards!==null?' <span class="ph-badge" style="background:var(--accb);color:var(--acc);border-color:rgba(88,166,255,.3);font-size:9px">vs '+tx('vill')+' '+bestOutsVIdx+'</span>':'';
  return'<div class="panel"><div class="ph"><span class="ph-title">'+tx('outs')+'</span>'+vsTag+'</div>'
    +'<div class="pb outs-pb">'+body+'</div></div>';
}

function potBody(){
  var pot=parseFloat(G.potV)||0,bet=parseFloat(G.betV)||0;
  var res='';
  if(pot>0&&bet>0){
    var need=(bet/(pot+bet)*100).toFixed(1);
    var msg=tx('potmsg').replace('{n}','<b>'+need+'%</b>');
    var eq0=G.eq?(G.eq[0].win*100):null;
    var ok=eq0!==null&&parseFloat(eq0)>=parseFloat(need);
    var cls=eq0!==null?(ok?' ok':' no'):'';
    var icon=eq0!==null?(ok?' \u2705':' \u274C'):'';
    res='<div class="pr'+cls+'">'+msg+icon+(eq0!==null?'<br>'+tx('yourEq')+': <b>'+eq0.toFixed(1)+'%</b>':'')+'</div>';
  } else if(!G.potV&&!G.betV){

function updateEmCode(){
  var ec=document.getElementById('emcode');
  if(!ec)return;
  var base=location.href.split('?')[0];
  var th=document.getElementById('emTheme');
  var la=document.getElementById('emLang');
  var thVal=th?th.value:'dark';
  var laVal=la?la.value:'auto';
  var params=[];
  if(thVal)params.push('theme='+thVal);
  if(laVal)params.push('lang='+laVal);
  var src=base+(params.length?'?'+params.join('&'):'');
  ec.textContent='<iframe\n  src="'+src+'"\n  width="100%" height="800"\n  style="border:none;border-radius:10px"\n  loading="lazy"\n></iframe>';
}
function safeCopy(text,cb){
  if(navigator.clipboard&&location.protocol!=='http:'){
    navigator.clipboard.writeText(text).then(cb).catch(function(){execCopy(text);cb&&cb();});
  }else{execCopy(text);cb&&cb();}
}
function execCopy(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:-99px';
  document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
}
function pushHistory(){
  G.history.push({
    players:G.players.map(function(p){return{cards:p.cards.slice()}}),
    comm:G.comm.slice(), phase:G.phase
  });
  if(G.history.length>20)G.history.shift();
}
function sched(){
  if(G.tmr)clearTimeout(G.tmr);
  G.tmr=setTimeout(function(){
    G.tmr=null;
    try{var r=calcEq(G.players.map(function(p){return p.cards}),G.comm);G.eq=r?r.results:null;G.eqMeta=r?{exact:r.exact,samples:r.samples}:null;}
    catch(e){G.eq=null;G.eqMeta=null;}
    render();
  },60);
  var sp=document.querySelector('.spin-r');
  if(sp)sp.classList.add('on');
}

/* ═══════════════════════════════════════════════
   § 9  EVENTS
═══════════════════════════════════════════════ */
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el){
    var pickOv=document.getElementById('pickOv');
    var embedOv=document.getElementById('embedOv');
    if(pickOv&&e.target===pickOv){G.sel=null;render();}
    if(embedOv&&e.target===embedOv){G.modal=null;render();}
    return;
  }
  var a=el.dataset.action;

  if(a==='tab'){G.tab=el.dataset.tab;G.sel=null;render();return;}
  if(a==='theme'){G.theme=G.theme==='dark'?'light':'dark';localStorage.setItem('pce-theme',G.theme);render();return;}

  if(a==='slot'){
    var type=el.dataset.stype,pidx=parseInt(el.dataset.spidx,10),pos=parseInt(el.dataset.spos,10);
    if(G.sel&&G.sel.type===type&&G.sel.pidx===pidx&&G.sel.pos===pos)G.sel=null;
    else G.sel={type:type,pidx:pidx,pos:pos};
    render();return;
  }
  if(a==='clearslot'){
    pushHistory();
    var ctype=el.dataset.stype,cpidx=parseInt(el.dataset.spidx,10),cpos=parseInt(el.dataset.spos,10);
    if(ctype==='p'){G.players[cpidx].cards[cpos]=-1;}
    else{
      /* Community: clearing slot i also clears i+1..4 (enforce order) */
      for(var ci=cpidx;ci<5;ci++)G.comm[ci]=-1;
    }
    if(G.sel&&G.sel.type===ctype&&G.sel.pidx===cpidx&&G.sel.pos===cpos)G.sel=null;
    G.eq=null;sched();render();return;
  }
  if(a==='pick'){if(el.classList.contains('used'))return;placeCard(parseInt(el.dataset.card,10));return;}
  if(a==='closepick'){G.sel=null;render();return;}

  if(a==='undo'){
    if(G.history.length>0){
      var prev=G.history.pop();
      G.players=prev.players.map(function(p){return{cards:p.cards.slice()}});
      G.comm=prev.comm.slice();G.phase=prev.phase;
      G.eq=null;G.eqMeta=null;G.sel=null;sched();render();
    }
    return;
  }
  if(a==='rqall'){G.rsel=new Set();for(var r=0;r<13;r++)for(var c=0;c<13;c++)G.rsel.add(cellH(r,c));G.preset=null;render();return;}
  if(a==='rqclear'){G.rsel=new Set();G.preset=null;render();return;}
  if(a==='rqpairs'){for(var r=0;r<13;r++){var h=cellH(r,r);if(G.rsel.has(h))G.rsel.delete(h);else G.rsel.add(h);}G.preset=null;render();return;}
  if(a==='rqsuited'){for(var r=0;r<13;r++)for(var c=r+1;c<13;c++){var h=cellH(r,c);if(G.rsel.has(h))G.rsel.delete(h);else G.rsel.add(h);}G.preset=null;render();return;}
  if(a==='rqoffsuit'){for(var r=0;r<13;r++)for(var c=0;c<r;c++){var h=cellH(r,c);if(G.rsel.has(h))G.rsel.delete(h);else G.rsel.add(h);}G.preset=null;render();return;}
  if(a==='copyrange'){
    var hands=Array.from(G.rsel).sort().join(',');
    safeCopy(hands,function(){
      var btn=el;var orig=btn.textContent;btn.textContent=tx('copied');setTimeout(function(){btn.textContent=tx('copyRange');},1500);
    });
    return;
  }
  if(a==='addp'){if(G.players.length<9){G.players.push({cards:[-1,-1]});G.eq=null;sched();render();}return;}
  if(a==='remp'){if(G.players.length>2){G.players.pop();G.eq=null;sched();render();}return;}
  if(a==='setplayers'){
    var np2=parseInt(el.dataset.n,10);
    G.players=[];for(var i=0;i<np2;i++)G.players.push({cards:[-1,-1]});
    G.comm=[-1,-1,-1,-1,-1];G.eq=null;G.sel=null;G.phase='play';render();return;
  }
  if(a==='rst'){
    G.players=[{cards:[-1,-1]},{cards:[-1,-1]}];
    G.comm=[-1,-1,-1,-1,-1];G.eq=null;G.sel=null;G.phase='setup';render();return;
  }
  if(a==='delvill'){
    var vi=parseInt(el.dataset.vidx,10);
    if(vi>=1&&vi<G.players.length&&G.players.length>2){
      G.players.splice(vi,1);
      /* If the selected slot was in the removed player, clear selection */
      if(G.sel&&G.sel.type==='p'&&G.sel.pidx===vi)G.sel=null;
      else if(G.sel&&G.sel.type==='p'&&G.sel.pidx>vi)G.sel.pidx--;
      G.eq=null;sched();render();
    }
    return;
  }
  if(a==='rnd'){doRandom();return;}

  if(a==='cell'){var h=el.dataset.hand;if(G.rsel.has(h))G.rsel.delete(h);else G.rsel.add(h);G.preset=null;render();return;}
  if(a==='preset'){G.preset=el.dataset.pos;G.rsel=new Set(POS[G.preset]);render();return;}

  /* Modals */
  if(a==='embed'){G.modal='embed';G.sel=null;render();return;}
  if(a==='closemodal'){G.modal=null;render();return;}

  /* Copy embed code */
  if(a==='copytxt'||el.id==='emcopy'){
    var box=document.getElementById('emcode');
    if(!box)return;
    try{safeCopy(box.textContent,function(){
      var b=document.getElementById('emcopy');if(b){b.textContent=tx('copied');b.classList.add('ok');setTimeout(function(){b.textContent=tx('copy');b.classList.remove('ok');},2000);}
    });}catch(err){}
    return;
  }

  /* Tutorial */
  if(a==='tutorial'){G.tutActive=true;G.tutStep=0;G.modal=null;render();return;}
  if(a==='tutskip'||a==='tutdone'){G.tutActive=false;render();return;}
  if(a==='tutnext'){var steps=tx('tutSteps');G.tutStep=Math.min(G.tutStep+1,steps.length-1);render();return;}
  if(a==='tutprev'){G.tutStep=Math.max(0,G.tutStep-1);render();return;}
});

document.addEventListener('change',function(e){
  if(e.target.dataset.action==='lang'){G.lang=e.target.value;try{localStorage.setItem('pce-lang',G.lang);}catch(e){}render();}
  if(e.target.id==='pp'){G.potV=e.target.value;patchPot();}
  if(e.target.id==='pb'){G.betV=e.target.value;patchPot();}
});
document.addEventListener('input',function(e){
  if(e.target.id==='pp'){G.potV=e.target.value;patchPot();}
  if(e.target.id==='pb'){G.betV=e.target.value;patchPot();}
});
/* Mobile: tap card to reveal × button */
document.addEventListener('touchstart',function(e){
  var cw=e.target.closest('.card-wrap');
  document.querySelectorAll('.card-wrap.touched').forEach(function(el){el.classList.remove('touched');});
  if(cw)cw.classList.add('touched');
},{passive:true});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    if(G.sel){G.sel=null;render();}
    else if(G.modal){G.modal=null;render();}
    else if(G.tutActive){G.tutActive=false;render();}
  }
  if(G.tutActive){
    var steps=tx('tutSteps');
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){if(G.tutStep<steps.length-1){G.tutStep++;render();}}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){if(G.tutStep>0){G.tutStep--;render();}}
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!G.tutActive){
    e.preventDefault();
    if(G.history.length>0){var prev=G.history.pop();G.players=prev.players.map(function(p){return{cards:p.cards.slice()}});G.comm=prev.comm.slice();G.phase=prev.phase;G.eq=null;G.eqMeta=null;G.sel=null;sched();render();}
  }
});

function placeCard(card){
  var sl=G.sel;if(!sl)return;
  /* Don't push history if card is unchanged */
  var curCard=sl.type==='p'?G.players[sl.pidx].cards[sl.pos]:G.comm[sl.pos];
  if(curCard!==card)pushHistory();
  G.players.forEach(function(p){p.cards=p.cards.map(function(c){return c===card?-1:c;});});
  G.comm=G.comm.map(function(c){return c===card?-1:c;});
  if(sl.type==='p')G.players[sl.pidx].cards[sl.pos]=card;
  else G.comm[sl.pidx]=card;
  G.sel=null;G.eq=null;sched();render();
}

function doRandom(){
  G.phase='play';
  var d=[];for(var i=0;i<52;i++)d.push(i);
  for(var i=d.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=d[i];d[i]=d[j];d[j]=t;}
  var idx=0;
  G.players.forEach(function(p){p.cards=[d[idx++],d[idx++]];});
  var cc=[0,3,3,4,5][Math.floor(Math.random()*5)];
  G.comm=[-1,-1,-1,-1,-1];for(var i=0;i<cc;i++)G.comm[i]=d[idx++];
  G.eq=null;G.sel=null;sched();render();
}

/* ═══════════════════════════════════════════════
   § 10  INIT
═══════════════════════════════════════════════ */
render();
</script>
